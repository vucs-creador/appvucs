<!DOCTYPE html>
<html lang="es"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo DF — Plataforma Comercial 2026</title>
<script src="index_files/react.production.min.js"></script>
<script src="index_files/react-dom.production.min.js"></script>
<script src="index_files/babel.min.js"></script>
<script src="index_files/3.4.17"></script>
<script src="index_files/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#0a1628;color:#eee;font-size:16px;min-height:100vh;}
.screen{display:none;} .screen.active{display:block;min-height:100vh;padding-bottom:70px;}
#retiros-module{display:none;padding-bottom:70px;}
#retiros-root{min-height:calc(100vh - 70px);}

/* LOGIN */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:#0f2040;border-radius:12px;padding:28px 24px;width:100%;max-width:340px;border:1px solid #1a3050;}
.login-box h2{text-align:center;margin-bottom:6px;font-size:22px;}
.login-box p{text-align:center;color:#888;font-size:13px;margin-bottom:24px;}
label{display:block;font-size:13px;color:#aaa;margin-bottom:6px;margin-top:14px;}
select,input[type=password]{width:100%;padding:12px;border-radius:8px;border:1px solid #1e3a5f;background:#0d1e38;color:#eee;font-size:16px;outline:none;}
select:focus,input:focus{border-color:#4f8ef7;}
.btn{width:100%;padding:13px;border-radius:8px;border:none;font-size:16px;font-weight:bold;cursor:pointer;margin-top:18px;}
.btn-blue{background:#4f8ef7;color:#fff;}
.btn-green{background:#3fcf8e;color:#111;}
.btn-gray{background:#0f2040;color:#aaa;font-size:13px;padding:8px 14px;width:auto;margin-top:0;border:1px solid #1a3050;}
.error{color:#f06060;font-size:13px;text-align:center;margin-top:10px;display:none;}

/* HEADER */
.header{background:#081020;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a3050;position:sticky;top:0;z-index:10;}
.header h3{font-size:16px;}
.header span{font-size:12px;color:#888;display:block;}

/* BODY */
.body{padding:16px;}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:10px;margin-top:6px;}

/* MESES */
.month-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.month-btn{background:#0f2040;border:1px solid #1a3050;border-radius:10px;padding:14px 12px;cursor:pointer;text-align:left;font-size:15px;font-weight:bold;color:#eee;}
.month-btn:active,.month-btn.selected{border-color:#4f8ef7;background:#0d2545;}
.month-btn .tag{font-size:11px;font-weight:normal;margin-top:4px;}
.tag-open{color:#3fcf8e;} .tag-future{color:#555;}
.month-btn.disabled{opacity:0.3;cursor:default;pointer-events:none;}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-box{background:#0f2040;border-radius:10px;padding:14px;border:1px solid #1a3050;}
.stat-box .label{font-size:11px;color:#888;margin-bottom:4px;}
.stat-box .val{font-size:24px;font-weight:bold;}
.val-green{color:#3fcf8e;} .val-amber{color:#f5a623;} .val-red{color:#f06060;}
.prog-box{background:#0f2040;border-radius:10px;padding:14px;margin-bottom:16px;border:1px solid #1a3050;}
.prog-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;}
.prog-bg{background:#0d2040;border-radius:99px;height:10px;}
.prog-fill{height:100%;border-radius:99px;background:#3fcf8e;transition:width 0.4s;}

/* SEMANAS Y DIAS */
.week-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;}
.week-btn{flex-shrink:0;padding:8px 16px;border-radius:8px;border:1px solid #1a3050;background:#0f2040;color:#888;font-size:14px;cursor:pointer;}
.week-btn.active{background:#4f8ef7;border-color:#4f8ef7;color:#fff;font-weight:bold;}
.day-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}
.day-btn{padding:10px 4px;border-radius:8px;border:1px solid #1a3050;background:#0f2040;color:#888;font-size:12px;cursor:pointer;text-align:center;}
.day-btn.active{border-color:#4f8ef7;color:#eee;background:#0d2545;}
.day-btn .dot{color:#3fcf8e;font-size:8px;display:block;height:10px;}

/* METRICAS */
.group-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#4f8ef7;margin:14px 0 8px;}
.metric-row{background:#0f2040;border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;border:1px solid #1a3050;}
.metric-row .mlabel{font-size:14px;flex:1;padding-right:10px;}
.metric-row input{width:80px;padding:8px 10px;border-radius:8px;border:1px solid #1e3a5f;background:#0d1e38;color:#eee;font-size:18px;text-align:right;outline:none;}
.metric-row input:focus{border-color:#4f8ef7;}

/* TOTALES */
.totales-box{background:#0a1e35;border:1px solid #1a3a5a;border-radius:10px;padding:14px;margin-bottom:16px;}
.totales-box .label{font-size:11px;text-transform:uppercase;color:#888;margin-bottom:10px;}
.totales-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tot-item .tl{font-size:11px;color:#888;}
.tot-item .tv{font-size:20px;font-weight:bold;}

/* GUARDAR */
.save-btn{width:100%;padding:14px;border-radius:10px;border:none;background:#3fcf8e;color:#111;font-size:16px;font-weight:bold;cursor:pointer;margin-top:16px;margin-bottom:10px;}
.save-btn:active{opacity:0.8;}
.save-btn:disabled{opacity:0.5;cursor:not-allowed;}
.save-msg{text-align:center;padding:10px;border-radius:8px;font-size:14px;display:none;margin-bottom:10px;}
.save-msg.ok{background:#1a3a2a;color:#3fcf8e;display:block;}
.save-msg.err{background:#3a1a1a;color:#f06060;display:block;}
.save-msg.loading{background:#0d2040;color:#4f8ef7;display:block;}

/* CEO */
.asesor-card{background:#0f2040;border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid #1a3050;}
.asesor-card-hdr{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a3050;}
.asesor-card-hdr .aname{font-size:15px;font-weight:bold;}
.badge{font-size:11px;padding:3px 9px;border-radius:6px;}
.badge-ok{background:#1a3a2a;color:#3fcf8e;}
.badge-warn{background:#3a2a0a;color:#f5a623;}
.badge-alert{background:#3a1a1a;color:#f06060;}
.asesor-card-body{padding:14px 16px;}
.meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.meta-row label{font-size:13px;color:#f5a623;}
.meta-input{width:80px;padding:8px 10px;border-radius:8px;border:1px solid #f5a623;background:#0a1830;color:#f5a623;font-size:18px;font-weight:bold;text-align:right;outline:none;}
.sem-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:13px;}
.sem-table th{background:#0d1e38;color:#888;font-weight:normal;padding:6px 8px;text-align:center;font-size:11px;}
.sem-table td{padding:7px 8px;text-align:center;border-top:1px solid #1a3050;}
.sem-table td:first-child{text-align:left;color:#888;font-size:12px;}
.asesor-prog{margin-top:8px;}
.asesor-prog-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
.equipo-box{background:#091828;border:1px solid #1e4070;border-radius:12px;padding:16px;margin-top:4px;}
.equipo-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#4f8ef7;margin-bottom:12px;}
.equipo-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.eq-label{font-size:11px;color:#888;}
.eq-val{font-size:22px;font-weight:bold;}
.consol-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px;}
.consol-table th{background:#0d2040;color:#4f8ef7;padding:7px 8px;font-size:11px;text-align:center;}
.consol-table td{padding:7px 8px;text-align:center;border-top:1px solid #1a3050;}
.consol-table td:first-child{text-align:left;font-weight:bold;}
.consol-table tr.equipo-row td{background:#0a2a1a;color:#3fcf8e;font-weight:bold;}

/* HUB */
.hub-bar{position:fixed;bottom:0;left:0;right:0;background:#081020;border-top:1px solid #1a3050;display:flex;z-index:50;}
.hub-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px 8px;font-size:11px;color:#445;cursor:pointer;border:none;background:none;font-family:Arial,sans-serif;}
.hub-tab.active{color:#4f8ef7;}
.hub-tab .hub-icon{font-size:20px;margin-bottom:3px;display:block;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:#0f2040;border:1px solid #1e3a5f;border-radius:10px;padding:12px 20px;font-size:14px;z-index:999;transition:transform 0.3s ease;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* SYNC indicator */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.sync-ok{background:#3fcf8e;}
.sync-off{background:#f06060;}
</style>

  {id:'seguimientos', label:'Seguimientos',        grupo:'Gestion'},
  {id:'cierres',      label:'Cierres (ventas)',     grupo:'Resultados'}
];

var DIAS    = ['Lun','Mar','Mie','Jue','Vie','Sab','Dom'];
var SEMANAS = ['Semana 1','Semana 2','Semana 3','Semana 4'];

var G = { user:null, mesKey:null, semana:0, dia:0, datos:{} };
var _suscripcion = null;

// ==========================================
// SUPABASE HELPERS
// ==========================================
async function sbGuardarDia(valores) {
  var asesor = USUARIOS[G.user].nombre;
  var payload = {
    asesor:       asesor,
    mes:          G.mesKey,
    semana:       G.semana + 1,
    dia:          G.dia,
    dia_nombre:   DIAS[G.dia],
    mensajes:     parseInt(valores.mensajes)     || 0,
    contactos:    parseInt(valores.contactos)    || 0,
    seguimientos: parseInt(valores.seguimientos) || 0,
    cierres:      parseInt(valores.cierres)      || 0,
    updated_at:   new Date().toISOString()
  };
  var res = await supa.from('registros').upsert(payload, {
    onConflict: 'asesor,mes,semana,dia'
  });
  return res;
}

async function sbCargarMes(asesor, mes) {
  var res = await supa.from('registros')
    .select('*')
    .eq('asesor', asesor)
    .eq('mes', mes);
  return res.data || [];
}

async function sbCargarMeta(asesor, mes) {
  var res = await supa.from('metas')
    .select('meta')
    .eq('asesor', asesor)
    .eq('mes', mes)
    .single();
  return (res.data && res.data.meta) || 0;
}

async function sbGuardarMeta(asesor, mes, meta) {
  await supa.from('metas').upsert(
    { asesor:asesor, mes:mes, meta:parseInt(meta)||0, updated_at:new Date().toISOString() },
    { onConflict:'asesor,mes' }
  );
}

// Convertir array de Supabase a objeto {s0_d0: {...}}
function rowsToLocal(rows) {
  var obj = {};
  for (var i=0; i<rows.length; i++) {
    var r = rows[i];
    var k = 's' + (r.semana-1) + '_d' + r.dia;
    obj[k] = { mensajes:r.mensajes, contactos:r.contactos, seguimientos:r.seguimientos, cierres:r.cierres };
  }
  return obj;
}

// ==========================================
// LOGIN
// ==========================================
function doLogin() {
  var uid  = document.getElementById('sel-user').value;
  var pass = document.getElementById('inp-pass').value;
  var err  = document.getElementById('login-err');
  err.style.display = 'none';
  if (!uid)              { err.textContent='Selecciona tu nombre'; err.style.display='block'; return; }
  if (!USUARIOS[uid])   { err.textContent='Usuario no encontrado'; err.style.display='block'; return; }
  if (pass !== USUARIOS[uid].pass) { err.textContent='Contrasena incorrecta'; err.style.display='block'; return; }
  if (!supa) { initSupa(); }
  G.user = uid;
  G.mesKey = null;
  G.datos = {};
  if (USUARIOS[uid].rol === 'ceo') {
    renderCeoMeses();
    showScreen('ceo');
  } else {
    document.getElementById('dash-nombre').textContent = USUARIOS[uid].nombre;
    renderMeses();
    showScreen('dashboard');
  }
  document.getElementById('hub-bar').style.display = 'flex';
  setSyncDot(true);
}

function doLogout() {
  if (_suscripcion) { _suscripcion.unsubscribe(); _suscripcion = null; }
  G = {user:null,mesKey:null,semana:0,dia:0,datos:{}};
  document.getElementById('sel-user').value = '';
  document.getElementById('inp-pass').value = '';
  document.getElementById('hub-bar').style.display = 'none';
  showScreen('login');
}

function setSyncDot(ok) {
  var d = document.getElementById('sync-dot');
  if (!d) return;
  d.className = 'sync-dot ' + (ok ? 'sync-ok' : 'sync-off');
}

// ==========================================
// DASHBOARD ASESOR
// ==========================================
function renderMeses() {
  var hoy = new Date(); var mesActual = hoy.getMonth();
  var html = '';
  for (var i=0; i<MESES.length; i++) {
    var m = MESES[i];
    var bloqueado = !m.abierto && i > mesActual;
    var cls = bloqueado ? 'tag-future' : 'tag-open';
    var lbl = bloqueado ? 'Proximo' : (i===mesActual ? 'Mes actual' : 'Disponible');
    var sel = G.mesKey===m.key ? 'selected' : '';
    var dis = bloqueado ? 'disabled' : '';
    var oc  = bloqueado ? '' : 'onclick="selMes(''+m.key+'')"';
    html += '<div class="month-btn '+sel+' '+dis+'" '+oc+'><div>'+m.label+'</div><div class="tag '+cls+'">'+lbl+'</div></div>';
  }
  document.getElementById('month-grid').innerHTML = html;
}

async function selMes(key) {
  G.mesKey = key;
  G.datos = {};
  renderMeses();
  document.getElementById('mes-stats').style.display = 'block';

  // Cargar datos desde Supabase
  var rows = await sbCargarMes(USUARIOS[G.user].nombre, key);
  G.datos = rowsToLocal(rows);

  // Cargar meta
  var meta = await sbCargarMeta(USUARIOS[G.user].nombre, key);
  document.getElementById('dash-meta').textContent = meta || '-';

  actualizarStats(meta);
  suscribirCambios(key);
}

function actualizarStats(meta) {
  var ventas = 0;
  var semActivas = 0;
  for (var s=0; s<4; s++) {
    var semTiene = false;
    for (var d=0; d<7; d++) {
      var k = 's'+s+'_d'+d;
      if (G.datos[k]) {
        ventas += parseInt(G.datos[k].cierres||0);
        if (parseInt(G.datos[k].cierres||0)>0) semTiene = true;
      }
    }
    if (semTiene) semActivas++;
  }
  document.getElementById('dash-ventas').textContent = ventas;
  document.getElementById('dash-semanas').textContent = semActivas;
  if (meta > 0) {
    var pct = Math.round((ventas/meta)*100);
    var col = pct>=80?'#3fcf8e':pct>=50?'#f5a623':'#f06060';
    document.getElementById('dash-pct').textContent = pct+'%';
    document.getElementById('dash-pct').style.color = col;
    document.getElementById('dash-pct2').textContent = pct+'%';
    document.getElementById('dash-pct2').style.color = col;
    document.getElementById('dash-bar').style.width = Math.min(pct,100)+'%';
    document.getElementById('dash-bar').style.background = col;
  }
}

// Suscripcion en tiempo real
function suscribirCambios(mes) {
  if (_suscripcion) { _suscripcion.unsubscribe(); }
  _suscripcion = supa.channel('cambios_'+mes)
    .on('postgres_changes', {event:'*', schema:'public', table:'registros',
      filter:'mes=eq.'+mes},
      function(payload) {
        // Actualizar datos locales
        var r = payload.new;
        if (r && r.asesor === USUARIOS[G.user].nombre) {
          var k = 's'+(r.semana-1)+'_d'+r.dia;
          G.datos[k] = {mensajes:r.mensajes,contactos:r.contactos,seguimientos:r.seguimientos,cierres:r.cierres};
        }
        setSyncDot(true);
      }
    ).subscribe();
}

// ==========================================
// REGISTRO DIARIO
// ==========================================
async function goRegistro() {
  var mes = MESES.find(function(m){return m.key===G.mesKey;});
  var meta = await sbCargarMeta(USUARIOS[G.user].nombre, G.mesKey);
  document.getElementById('reg-nombre').textContent = USUARIOS[G.user].nombre;
  var metaTxt = meta>0 ? mes.label+' 2026     Meta: '+meta : mes.label+' 2026';
  document.getElementById('reg-mes-hdr').textContent = metaTxt;
  document.getElementById('reg-titulo').textContent = mes.label+' 2026';
  G.semana=0; G.dia=0;
  renderSemanas(); renderDias(); renderForm();
  showScreen('registro');
}

function volver() { renderMeses(); showScreen('dashboard'); }

function renderSemanas() {
  document.getElementById('week-row').innerHTML = SEMANAS.map(function(s,i){
    return '<button class="week-btn '+(G.semana===i?'active':'')+'" onclick="selSemana('+i+')">'+s+'</button>';
  }).join('');
}

function selSemana(i) { G.semana=i; G.dia=0; renderSemanas(); renderDias(); renderForm(); }

function renderDias() {
  document.getElementById('day-row').innerHTML = DIAS.map(function(d,i){
    var k='s'+G.semana+'_d'+i;
    var ok=G.datos[k]&&tieneValor(G.datos[k]);
    return '<div class="day-btn '+(G.dia===i?'active':'')+'" onclick="selDia('+i+')">'+'<strong>'+d+'</strong><span class="dot">'+(ok?'●':'')+'</span></div>';
  }).join('');
}

function tieneValor(obj) {
  for (var k in obj) { if (parseInt(obj[k])>0) return true; } return false;
}

function selDia(i) {
  G.dia=i; renderDias(); renderForm();
  document.getElementById('reg-subtitulo').textContent = SEMANAS[G.semana]+'   '+DIAS[G.dia];
}

function renderForm() {
  var k='s'+G.semana+'_d'+G.dia;
  var saved=G.datos[k]||{};
  var grupos=['Embudo','Gestion','Resultados'];
  var c=document.getElementById('form-metricas');
  c.innerHTML='';
  grupos.forEach(function(g) {
    var mets=METRICAS.filter(function(m){return m.grupo===g;});
    if (!mets.length) return;
    var hdr=document.createElement('div');
    hdr.className='group-title'; hdr.textContent=g; c.appendChild(hdr);
    var form=document.createElement('div');
    mets.forEach(function(m) {
      var row=document.createElement('div');
      row.className='metric-row';
      row.innerHTML='<div class="mlabel">'+m.label+'</div><input type="number" min="0" id="m_'+m.id+'" value="'+(saved[m.id]||'')+'" placeholder="0">';
      form.appendChild(row);
    });
    c.appendChild(form);
  });
  renderTotalesSemana();
  document.getElementById('save-msg').style.display='none';
}

function renderTotalesSemana() {
  var tot={mensajes:0,contactos:0,seguimientos:0,cierres:0};
  for (var d=0;d<7;d++) {
    var data=G.datos['s'+G.semana+'_d'+d]||{};
    for (var k in tot) tot[k]+=parseInt(data[k]||0);
  }
  var conv=tot.contactos>0?((tot.cierres/tot.contactos)*100).toFixed(1):'0.0';
  document.getElementById('totales-semana').innerHTML=
    '<div class="totales-box"><div class="label">Totales '+SEMANAS[G.semana]+'</div>'+
    '<div class="totales-grid">'+
    '<div class="tot-item"><div class="tl">Contactos ef.</div><div class="tv">'+tot.contactos+'</div></div>'+
    '<div class="tot-item"><div class="tl">Cierres</div><div class="tv" style="color:#3fcf8e">'+tot.cierres+'</div></div>'+
    '<div class="tot-item"><div class="tl">Conversion</div><div class="tv">'+conv+'%</div></div>'+
    '<div class="tot-item"><div class="tl">Seguimientos</div><div class="tv">'+tot.seguimientos+'</div></div>'+
    '</div></div>';
}

async function guardarDia() {
  var btn=document.getElementById('btn-save');
  var msg=document.getElementById('save-msg');
  var valores={};
  METRICAS.forEach(function(m) {
    var el=document.getElementById('m_'+m.id);
    valores[m.id]=el?el.value.toString().trim():'0';
  });

  // Guardar local inmediatamente
  var k='s'+G.semana+'_d'+G.dia;
  G.datos[k]=valores;
  renderDias(); renderTotalesSemana();

  btn.disabled=true;
  msg.className='save-msg loading'; msg.textContent='Guardando...'; msg.style.display='block';

  try {
    var res=await sbGuardarDia(valores);
    if (res.error) throw new Error(res.error.message);
    msg.className='save-msg ok'; msg.textContent='✓ Guardado correctamente';
    toast('Guardado ✓');
    setSyncDot(true);
    // Actualizar stats del dashboard
    var meta=parseInt(document.getElementById('dash-meta').textContent)||0;
    actualizarStats(meta);
  } catch(e) {
    msg.className='save-msg err'; msg.textContent='✗ '+e.message;
    setSyncDot(false);
  } finally {
    btn.disabled=false;
    setTimeout(function(){msg.style.display='none';},3000);
  }
}

// ==========================================
// CEO PANEL
// ==========================================
function renderCeoMeses() {
  var hoy=new Date(); var mesActual=hoy.getMonth();
  var html='';
  for (var i=0;i<MESES.length;i++) {
    var m=MESES[i];
    var bloqueado=!m.abierto&&i>mesActual;
    var cls=bloqueado?'tag-future':'tag-open';
    var lbl=bloqueado?'Proximo':(i===mesActual?'Mes actual':'Disponible');
    var sel=G.mesKey===m.key?'selected':'';
    var dis=bloqueado?'disabled':'';
    var oc=bloqueado?'':'onclick="ceoSelMes(''+m.key+'')"';
    html+='<div class="month-btn '+sel+' '+dis+'" '+oc+'><div>'+m.label+'</div><div class="tag '+cls+'">'+lbl+'</div></div>';
  }
  document.getElementById('ceo-month-grid').innerHTML=html;
}

async function ceoSelMes(key) {
  G.mesKey=key;
  renderCeoMeses();
  document.getElementById('ceo-panel').style.display='block';
  document.getElementById('ceo-asesores').innerHTML='<div style="color:#888;padding:1rem;text-align:center">⏳ Cargando datos del equipo...</div>';

  await renderCeoPanel(key);

  // Suscripcion en tiempo real para el CEO
  if (_suscripcion) _suscripcion.unsubscribe();
  _suscripcion = supa.channel('ceo_'+key)
    .on('postgres_changes',{event:'*',schema:'public',table:'registros',filter:'mes=eq.'+key},
      function() { renderCeoPanel(key); }
    )
    .on('postgres_changes',{event:'*',schema:'public',table:'metas',filter:'mes=eq.'+key},
      function() { renderCeoPanel(key); }
    )
    .subscribe();
}

async function renderCeoPanel(mes) {
  var ASESORES = [
    {uid:'lorena',    nombre:'Lorena',     color:'#4f8ef7'},
    {uid:'yuri',      nombre:'Yuri',       color:'#3fcf8e'},
    {uid:'josedavid', nombre:'Jose David', color:'#a78bfa'}
  ];

  var totalVentas=0, totalMeta=0;
  var ventasPorSemana=[0,0,0,0];
  var cards=[];

  for (var i=0;i<ASESORES.length;i++) {
    var a=ASESORES[i];
    var rows=await sbCargarMes(a.nombre, mes);
    var meta=await sbCargarMeta(a.nombre, mes);
    var ventasSem=[0,0,0,0];
    for (var j=0;j<rows.length;j++) {
      var s=rows[j].semana-1;
      ventasSem[s]+=parseInt(rows[j].cierres||0);
    }
    var vt=ventasSem[0]+ventasSem[1]+ventasSem[2]+ventasSem[3];
    totalVentas+=vt; totalMeta+=meta;
    for (var s=0;s<4;s++) ventasPorSemana[s]+=ventasSem[s];
    cards.push({a:a,meta:meta,ventasSem:ventasSem,vt:vt});
  }

  // Render tarjetas asesores
  var html='';
  for (var i=0;i<cards.length;i++) {
    var c=cards[i];
    var pct=c.meta>0?Math.round((c.vt/c.meta)*100):0;
    var bc=pct>=80?'#3fcf8e':pct>=50?'#f5a623':'#f06060';
    var badge=pct>=80?'badge-ok':pct>=50?'badge-warn':'badge-alert';
    var badgeTxt=(c.meta>0?pct+'%  ':'')+( pct>=80?'En rango':pct>=50?'Revisar':'Alerta');
    html+='<div class="asesor-card">';
    html+='<div class="asesor-card-hdr"><div class="aname" style="color:'+c.a.color+'">'+c.a.nombre+'</div><span class="badge '+badge+'">'+badgeTxt+'</span></div>';
    html+='<div class="asesor-card-body">';
    html+='<div class="meta-row"><label>Meta mensual</label><input class="meta-input" type="number" min="0" id="meta_'+c.a.uid+'" value="'+(c.meta||'')+'" placeholder="0" onblur="guardarMetaCeo(''+c.a.uid+'',''+c.a.nombre+'')"></div>';
    html+='<table class="sem-table"><tr><th></th><th>S1</th><th>S2</th><th>S3</th><th>S4</th><th>Total</th></tr><tr><td>Ventas</td>';
    for (var s=0;s<4;s++) html+='<td>'+(c.ventasSem[s]>0?'<strong>'+c.ventasSem[s]+'</strong>':'<span style="color:#555">0</span>')+'</td>';
    html+='<td><strong style="color:#3fcf8e">'+c.vt+'</strong></td></tr></table>';
    html+='<div class="asesor-prog"><div class="asesor-prog-label"><span style="color:#888;font-size:12px">Cumplimiento</span><span style="color:'+bc+';font-weight:bold">'+(c.meta>0?pct+'%':'- sin meta')+'</span></div>';
    html+='<div class="prog-bg"><div class="prog-fill" style="width:'+Math.min(pct,100)+'%;background:'+bc+'"></div></div></div>';
    html+='</div></div>';
  }
  document.getElementById('ceo-asesores').innerHTML=html;

  // Consolidado
  var pctEq=totalMeta>0?Math.round((totalVentas/totalMeta)*100):0;
  var eqColor=pctEq>=80?'#3fcf8e':pctEq>=50?'#f5a623':'#f06060';
  var cons='<div class="equipo-box">';
  cons+='<div class="equipo-title">Consolidado equipo</div>';
  cons+='<div class="equipo-stats">';
  cons+='<div><div class="eq-label">Total ventas</div><div class="eq-val" style="color:#3fcf8e">'+totalVentas+'</div></div>';
  cons+='<div><div class="eq-label">Meta equipo</div><div class="eq-val" style="color:#f5a623">'+(totalMeta||'-')+'</div></div>';
  cons+='<div><div class="eq-label">Cumplimiento</div><div class="eq-val" style="color:'+eqColor+'">'+(totalMeta>0?pctEq+'%':'-')+'</div></div>';
  cons+='</div>';
  cons+='<div class="prog-box" style="background:#111;border:none;padding:0;margin-bottom:14px">';
  cons+='<div class="prog-row"><span style="font-weight:bold">Equipo vs Meta</span><span style="color:'+eqColor+'">'+(totalMeta>0?pctEq+'%':'Configura metas')+'</span></div>';
  cons+='<div class="prog-bg"><div class="prog-fill" style="width:'+Math.min(pctEq,100)+'%;background:'+eqColor+'"></div></div></div>';
  cons+='<table class="consol-table"><tr><th>Asesor</th><th>S1</th><th>S2</th><th>S3</th><th>S4</th><th>Total</th><th>%</th></tr>';
  for (var i=0;i<cards.length;i++) {
    var c=cards[i];
    var pctA=c.meta>0?Math.round((c.vt/c.meta)*100):0;
    var pc=pctA>=80?'#3fcf8e':pctA>=50?'#f5a623':'#f06060';
    cons+='<tr><td style="color:'+c.a.color+'">'+c.a.nombre+'</td>';
    for (var s=0;s<4;s++) cons+='<td>'+(c.ventasSem[s]||'-')+'</td>';
    cons+='<td style="color:#3fcf8e;font-weight:bold">'+c.vt+'</td>';
    cons+='<td style="color:'+pc+';font-weight:bold">'+(c.meta>0?pctA+'%':'-')+'</td></tr>';
  }
  cons+='<tr class="equipo-row"><td>EQUIPO</td>';
  for (var s=0;s<4;s++) cons+='<td>'+ventasPorSemana[s]+'</td>';
  cons+='<td>'+totalVentas+'</td><td>'+(totalMeta>0?pctEq+'%':'-')+'</td></tr>';
  cons+='</table></div>';
  document.getElementById('ceo-consolidado').innerHTML=cons;
}

async function guardarMetaCeo(uid, nombre) {
  var inp=document.getElementById('meta_'+uid);
  if (!inp) return;
  var val=parseInt(inp.value)||0;
  await sbGuardarMeta(nombre, G.mesKey, val);
  toast('Meta de '+nombre+' guardada ✓');
  renderCeoPanel(G.mesKey);
}

// ==========================================
// NAVEGACION HUB
// ==========================================
var _moduloActivo='seguimiento';

function switchModule(mod) {
  _moduloActivo=mod;
  var screens=['login','dashboard','registro','ceo'];
  var activo=null;
  for (var i=0;i<screens.length;i++) {
    if (document.getElementById(screens[i]).classList.contains('active')) { activo=screens[i]; break; }
  }
  var seg=document.getElementById('seguimiento-module-wrap');
  var ret=document.getElementById('retiros-module');
  if (mod==='seguimiento') {
    if (seg) seg.style.display='block';
    ret.style.display='none';
    if (activo && activo!=='login') showScreen(activo);
  } else {
    screens.forEach(function(s){ document.getElementById(s).classList.remove('active'); });
    if (seg) seg.style.display='none';
    ret.style.display='block';
  }
  document.getElementById('tab-seguimiento').className='hub-tab'+(mod==='seguimiento'?' active':'');
  document.getElementById('tab-retiros').className='hub-tab'+(mod==='retiros'?' active':'');
  window.scrollTo(0,0);
}

// ==========================================
// UTILIDADES
// ==========================================
function showScreen(name) {
  ['login','dashboard','registro','ceo'].forEach(function(s){
    document.getElementById(s).className='screen'+(s===name?' active':'');
  });
  window.scrollTo(0,0);
  var hub=document.getElementById('hub-bar');
  hub.style.display=name==='login'?'none':'flex';
}

function toast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show';
  setTimeout(function(){t.className='toast';},2500);
}

document.getElementById('inp-pass').addEventListener('keypress',function(e){
  if (e.keyCode===13||e.key==='Enter') doLogin();
});

            useEffect(() => {

                    localStorage.setItem('asesores_nube_gs_v2', JSON.stringify(asesoresRegistrados));
                    localStorage.setItem('causas_nube_gs_v2', JSON.stringify(causasDefinidas));

            }, [retiros, asesoresRegistrados, causasDefinidas]);

                    try {
                        const response = await fetch(APPS_SCRIPT_URL + '?action=getData');
                        const resultado = await response.json();
                        if (resultado.data && resultado.data.length > 0) {

                                let fechaParsed = new Date().toISOString().split('T')[0];

                                        if (!isNaN(d.getTime())) {
                                            fechaParsed = d.toISOString().split('T')[0];
                                        }
                                    } catch(e) {}
                                }
                                return {

                                    nombre: fila[1] || '',
                                    cantidad: parseInt(fila[2]) || 0,
                                    causa: fila[3] || '',
                                    fecha: fechaParsed,
                                    validada: true
                                };
                            }).filter(d => d.nombre);
                            setDatosSheet(datosFormateados);

                    } catch (err) {
                        console.log('Lectura del Sheet en progreso...');
                    }
                };
                obtenerDatos();
                const intervalo = setInterval(obtenerDatos, 5000);
                return () => clearInterval(intervalo);

            const registrarAsesor = (nombre) => {
                if (nombre && !asesoresRegistrados.includes(nombre)) {
                    setAsesoresRegistrados([...asesoresRegistrados, nombre]);
                    return true;
                }
                return asesoresRegistrados.includes(nombre);
            };

            const encontrarCausaSimilar = (causaInput) => {
                const inputNorm = causaInput.toLowerCase().trim();
                const exacta = causasDefinidas.find(c => c.toLowerCase().trim() === inputNorm);
                if (exacta) return exacta;
                const similares = causasDefinidas.filter(c => {
                    const cNorm = c.toLowerCase();
                    const palabrasInput = inputNorm.split(' ');
                    const palabrasC = cNorm.split(' ');
                    return palabrasInput.some(p => palabrasC.includes(p)) ||
                           palabrasC.some(p => palabrasInput.includes(p));
                });
                return similares.length > 0 ? similares[0] : null;
            };

            const agregarRetiro = async () => {
                if (!nuevaFila.cantidad || nuevaFila.cantidad < 1) { alert('Ingresa una cantidad válida'); return; }
                if (!nuevaFila.causa.trim()) { alert('Selecciona o describe la causa'); return; }
                if (!asesorSeleccionado.trim()) { alert('Selecciona o ingresa tu nombre'); return; }
                registrarAsesor(asesorSeleccionado);
                setCargando(true);
                let causaFinal = nuevaFila.causa;
                if (!causasDefinidas.includes(nuevaFila.causa)) {
                    const similar = encontrarCausaSimilar(nuevaFila.causa);
                    causaFinal = similar || nuevaFila.causa;
                    if (!similar) setCausasDefinidas([...causasDefinidas, nuevaFila.causa]);
                }
                try {
                    const response = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ nombre: asesorSeleccionado, cantidad: parseInt(nuevaFila.cantidad), causa: causaFinal })
                    });
                    if (response.ok) {
                        setNuevaFila({ cantidad: 1, causa: '', descripcion: '' });

                    console.error('Error:', err);
                    alert('Error al guardar en Sheet');
                }
                setCargando(false);

            const agregarNuevaCausa = () => {
                if (!nuevaCausa.trim()) { alert('Escribe la nueva causa'); return; }
                if (causasDefinidas.includes(nuevaCausa.trim())) { alert('Esta causa ya existe'); return; }

                setNuevaCausa('');

                setCausasDefinidas(causasDefinidas.filter(c => c !== causa));

            // ============ CÁLCULOS BASE ============
            const datosActivos = datosSheet.length > 0 ? datosSheet : retiros;
            const mesActual = new Date().toISOString().substring(0, 7);

            // Todos los meses con datos, ordenados de más reciente a más antiguo
            const mesesDisponibles = [...new Set(

            )].sort().reverse();

            const mesSeleccionado = mesFiltro === 'actual' ? mesActual : mesFiltro;

            // Datos del mes seleccionado
            const datosDelMes = datosActivos.filter(r => (r.fecha || '').startsWith(mesSeleccionado));

            const asesores = ['Todos', ...new Set(datosDelMes.map(r => r.nombre))];

            const retirosFiltrados = filtroAsesor === 'Todos'

                : datosDelMes.filter(r => r.nombre === filtroAsesor);

            const estadisticasGenerales = causasDefinidas.map(causa => ({
                name: causa,
                value: retirosFiltrados.reduce((sum, r) => r.causa === causa ? sum + r.cantidad : sum, 0)
            })).filter(e => e.value > 0).sort((a, b) => b.value - a.value);

            // Meses disponibles para asesor: desde el mes actual hasta diciembre del año en curso
            const mesesAsesorDisponibles = (() => {
                const lista = [];
                const hoy = new Date();
                const anio = hoy.getFullYear();
                const mesInicio = hoy.getMonth(); // 0-indexed
                for (let m = mesInicio; m <= 11; m++) {
                    const mm = String(m + 1).padStart(2, '0');
                    lista.push(`${anio}-${mm}`);
                }
                return lista; // ordenados: más cercano primero
            })();

            const mesAsesorSeleccionado = mesAsesor === 'actual' ? mesActual : mesAsesor;

            const retirosAsesor = datosActivos.filter(r => r.nombre === asesorSeleccionado);

            // Para vista asesor — mes seleccionado
            const retirosAsesorMes = retirosAsesor.filter(r => (r.fecha || '').startsWith(mesAsesorSeleccionado));
            const totalAsesorMes = retirosAsesorMes.reduce((sum, r) => sum + r.cantidad, 0);
            const estadisticasAsesorMes = causasDefinidas.map(causa => ({
                name: causa,
                value: retirosAsesorMes.reduce((sum, r) => r.causa === causa ? sum + r.cantidad : sum, 0)
            })).filter(e => e.value > 0).sort((a, b) => b.value - a.value);

            // Estadísticas globales del asesor (todos los meses)
            const estadisticasAsesor = causasDefinidas.map(causa => ({
                name: causa,
                value: retirosAsesor.reduce((sum, r) => r.causa === causa ? sum + r.cantidad : sum, 0)

            // ============ HISTÓRICO ACUMULADO ============
            const totalTodosLosTiempos = datosActivos.reduce((sum, r) => sum + r.cantidad, 0);

            const historicoMensual = mesesDisponibles.map(mes => {
                const datosMes = datosActivos.filter(r => (r.fecha || '').startsWith(mes));
                const total = datosMes.reduce((sum, r) => sum + r.cantidad, 0);
                const causasMes = causasDefinidas.map(causa => ({
                    causa,
                    count: datosMes.reduce((sum, r) => r.causa === causa ? sum + r.cantidad : sum, 0)
                })).filter(c => c.count > 0).sort((a, b) => b.count - a.count);
                return { mes, label: formatMes(mes), labelLargo: formatMesLargo(mes), total, causas: causasMes };
            });

            const maxTotalMes = Math.max(...historicoMensual.map(m => m.total), 1);

            // Ranking histórico de causas
            const causasHistoricas = causasDefinidas.map(causa => ({
                causa,
                count: datosActivos.reduce((sum, r) => r.causa === causa ? sum + r.cantidad : sum, 0),
                porMes: mesesDisponibles.map(mes => ({
                    mes,
                    label: formatMes(mes),
                    count: datosActivos.filter(r => (r.fecha || '').startsWith(mes))
                                       .reduce((sum, r) => r.causa === causa ? sum + r.cantidad : sum, 0)
                }))
            })).filter(c => c.count > 0).sort((a, b) => b.count - a.count);

            // ============ LOGIN ============
            if (!userType) {

                                                {retirosMes > 0 && (

                                {asesorSeleccionado && (

                                {asesorSeleccionado && (

                                                    value={nuevaFila.causa}

                            {/* MIS ESTADÍSTICAS DEL MES */}
                            {asesorSeleccionado && (

                                            return (
                                                <div key={mes} className={`flex items-center justify-between px-4 py-2.5 rounded-lg ${esMesActual ? 'bg-cyan-900/30 border border-cyan-700/50' : 'bg-slate-700/30'}`}>
                                                    <span className={`text-sm font-medium ${esMesActual ? 'text-cyan-300' : 'text-slate-300'}`}>
                                                        {formatMesLargo(mes)} {esMesActual && <span className="text-xs text-cyan-500">(actual)</span>}
                                                    </span>
                                                    <span className={`font-black text-lg ${total > 0 ? 'text-cyan-400' : 'text-slate-600'}`}>
                                                        {total > 0 ? total : '—'}
                                                    </span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                );
            }

            // ============ VISTA GERENTE ============
            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 p-4 md:p-8">

                    {/* HEADER */}
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-4xl font-bold text-white">📊 Panel Gerencial</h1>
                            <p className="text-slate-400 text-sm">Lee datos EN TIEMPO REAL desde Google Sheets · v5</p>
                        </div>
                        <button
                            onClick={() => { setUserType(null); setUserPass(''); }}
                            className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold transition-all active:scale-95"
                        >
                            🚪 Salir
                        </button>
                    </div>

                    {/* STATUS BAR */}
                    <div className="glass rounded-2xl p-4 mb-8 border-l-4 border-green-500">
                        <p className="text-green-300 text-sm">
                            ✓ Conectado a Google Sheet &nbsp;|&nbsp; 🔄 Actualiza cada 5 segundos &nbsp;|&nbsp; 📊 Registros totales: {datosSheet.length} &nbsp;|&nbsp; 📅 Meses con datos: {mesesDisponibles.length}
                        </p>
                    </div>

                    {/* ====== SELECTOR DE MES ====== */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <h2 className="text-lg font-bold text-white mb-1">📅 Período de Análisis</h2>
                        <p className="text-slate-400 text-xs mb-4">Selecciona el mes para ver estadísticas e historial de ese período</p>
                        <div className="flex flex-wrap gap-2 overflow-x-auto scrollbar-thin pb-1">
                            <button
                                onClick={() => { setMesFiltro('actual'); setFiltroAsesor('Todos'); }}
                                className={`px-4 py-2 rounded-lg transition-all text-sm font-semibold whitespace-nowrap ${mesFiltro === 'actual' ? 'bg-cyan-500 text-white shadow-lg shadow-cyan-900/50' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}
                            >
                                🗓️ {formatMes(mesActual)} (Actual)
                            </button>
                            {mesesDisponibles.filter(m => m !== mesActual).map(mes => (
                                <button
                                    key={mes}
                                    onClick={() => { setMesFiltro(mes); setFiltroAsesor('Todos'); }}
                                    className={`px-4 py-2 rounded-lg transition-all text-sm font-medium whitespace-nowrap ${mesFiltro === mes ? 'bg-purple-600 text-white shadow-lg shadow-purple-900/50' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}
                                >
                                    {formatMes(mes)}
                                </button>
                            ))}
                            {mesesDisponibles.length === 0 && (
                                <p className="text-slate-500 text-sm italic">Los meses aparecerán aquí cuando haya datos históricos.</p>
                            )}
                        </div>
                    </div>

                    {/* ====== GESTIÓN DE CAUSAS ====== */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-lg font-bold text-white">⚙️ Gestión de Causas</h2>
                            <button
                                onClick={() => setMostrarPanelCausas(!mostrarPanelCausas)}
                                className="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded transition-all"
                            >
                                {mostrarPanelCausas ? 'Ocultar' : 'Editar'}
                            </button>
                        </div>
                        {mostrarPanelCausas && (
                            <div className="bg-slate-700/50 p-4 rounded-lg">
                                <div className="flex gap-2 mb-4">
                                    <input
                                        type="text" placeholder="Nueva causa..." value={nuevaCausa}
                                        onChange={(e) => setNuevaCausa(e.target.value)}
                                        className="flex-1 px-4 py-2 bg-slate-700 text-white placeholder-slate-400 rounded-lg border border-slate-600 focus:border-cyan-500 focus:outline-none"
                                    />
                                    <button onClick={agregarNuevaCausa} className="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-semibold transition-all">
                                        ➕ Agregar
                                    </button>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {causasDefinidas.map(causa => (
                                        <div key={causa} className="bg-slate-600 px-3 py-1 rounded-full flex items-center gap-2 text-sm text-white">
                                            {causa}
                                            <button onClick={() => eliminarCausa(causa)} className="text-red-400 hover:text-red-600 font-bold">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* ====== FILTRO POR ASESOR ====== */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <h2 className="text-lg font-bold text-white mb-1">🔍 Filtrar por Asesor</h2>
                        <p className="text-slate-400 text-xs mb-4">Período: <span className="text-cyan-400 font-semibold">{formatMesLargo(mesSeleccionado)}</span></p>
                        <div className="flex flex-wrap gap-2">
                            {asesores.map(asesor => (
                                <button
                                    key={asesor}
                                    onClick={() => setFiltroAsesor(asesor)}
                                    className={`px-4 py-2 rounded-lg transition-all text-sm font-medium ${filtroAsesor === asesor ? 'bg-cyan-500 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}
                                >
                                    {asesor} ({datosDelMes.filter(r => asesor === 'Todos' || r.nombre === asesor).reduce((sum, r) => sum + r.cantidad, 0)})
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* ====== ESTADÍSTICAS DEL MES ====== */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <h2 className="text-lg font-bold text-white mb-4">
                            📈 {filtroAsesor === 'Todos' ? `Estadísticas — ${formatMesLargo(mesSeleccionado)}` : `Retiros de ${filtroAsesor} — ${formatMesLargo(mesSeleccionado)}`}
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div className="bg-slate-700/50 p-4 rounded-lg">
                                <p className="text-slate-400 text-sm mb-1">Total Retiros</p>
                                <p className="text-3xl font-bold text-cyan-400">{totalGeneral}</p>
                            </div>
                            <div className="bg-slate-700/50 p-4 rounded-lg">
                                <p className="text-slate-400 text-sm mb-1">Causa Principal</p>
                                <p className="text-lg font-bold text-white">{estadisticasGenerales.length > 0 ? estadisticasGenerales[0].name : 'N/A'}</p>
                                <p className="text-sm text-cyan-400">{estadisticasGenerales.length > 0 ? estadisticasGenerales[0].value : 0} retiros</p>
                            </div>
                            <div className="bg-slate-700/50 p-4 rounded-lg">
                                <p className="text-slate-400 text-sm mb-1">Registros</p>
                                <p className="text-3xl font-bold text-purple-400">{retirosFiltrados.length}</p>
                            </div>
                        </div>

                        {estadisticasGenerales.length > 0 && (
                            <div className="bg-slate-700/50 p-4 rounded-lg">
                                <h3 className="text-white font-bold mb-4">Distribución por Causa</h3>
                                <div className="space-y-3">
                                    {estadisticasGenerales.map((stat, idx) => {
                                        const porcentaje = ((stat.value / totalGeneral) * 100).toFixed(1);
                                        return (
                                            <div key={idx}>
                                                <div className="flex justify-between mb-1">
                                                    <p className="text-slate-300 text-sm">{stat.name}</p>
                                                    <p className="text-cyan-400 font-bold">{stat.value} ({porcentaje}%)</p>
                                                </div>
                                                <div className="w-full bg-slate-600 rounded-full h-3">
                                                    <div className="bg-cyan-500 h-3 rounded-full transition-all" style={{width: `${porcentaje}%`}}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                        {estadisticasGenerales.length === 0 && (
                            <p className="text-slate-400 text-center py-4 italic">Sin retiros registrados en {formatMesLargo(mesSeleccionado)}.</p>
                        )}
                    </div>

                    {/* ====== HISTORIAL DEL MES ====== */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <h2 className="text-lg font-bold text-white mb-4">📋 Historial — {formatMesLargo(mesSeleccionado)}</h2>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="border-b border-slate-600">
                                        <th className="text-left py-3 px-4 text-slate-300 font-semibold">Asesor</th>
                                        <th className="text-left py-3 px-4 text-slate-300 font-semibold">Cantidad</th>
                                        <th className="text-left py-3 px-4 text-slate-300 font-semibold">Causa</th>
                                        <th className="text-left py-3 px-4 text-slate-300 font-semibold">Estado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {datosActivos
                                        .filter(r => (r.fecha || '').startsWith(mesSeleccionado))
                                        .filter(r => filtroAsesor === 'Todos' || r.nombre === filtroAsesor)
                                        .map((r, idx) => (
                                        <tr key={idx} className="border-b border-slate-700 hover:bg-slate-700/30 transition-colors">
                                            <td className="py-3 px-4 text-slate-300 font-semibold">{r.nombre}</td>
                                            <td className="py-3 px-4">
                                                <span className="bg-cyan-900 text-cyan-300 px-2 py-1 rounded font-bold text-sm">{r.cantidad}</span>
                                            </td>
                                            <td className="py-3 px-4 text-slate-200">{r.causa}</td>
                                            <td className="py-3 px-4">
                                                <span className="text-green-400 text-xs font-bold">✓ Validado</span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {datosActivos.filter(r => (r.fecha || '').startsWith(mesSeleccionado)).length === 0 && (
                                <p className="text-slate-400 text-center py-6 italic">Sin registros para {formatMesLargo(mesSeleccionado)}.</p>
                            )}
                        </div>
                    </div>

                    {/* ====================================================== */}
                    {/* ========== NUEVO: HISTÓRICO ACUMULADO EMPRESA ========= */}
                    {/* ====================================================== */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <div className="mb-6">
                            <h2 className="text-xl font-bold text-white mb-1">📆 Histórico Acumulado — Empresa</h2>
                            <p className="text-slate-400 text-sm">Evolución mes a mes de retiros y causa que los genera</p>
                        </div>

                        {/* KPIs globales */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="bg-gradient-to-br from-cyan-900/60 to-blue-900/60 border border-cyan-700/50 p-5 rounded-xl">
                                <p className="text-cyan-300 text-sm mb-1">Total Acumulado Empresa</p>
                                <p className="text-5xl font-black text-white">{totalTodosLosTiempos}</p>
                                <p className="text-cyan-400 text-xs mt-1">Todos los meses registrados</p>
                            </div>
                            <div className="bg-gradient-to-br from-purple-900/60 to-slate-900/60 border border-purple-700/50 p-5 rounded-xl">
                                <p className="text-purple-300 text-sm mb-1">Meses en el Registro</p>
                                <p className="text-5xl font-black text-white">{mesesDisponibles.length}</p>
                                <p className="text-purple-400 text-xs mt-1">
                                    {mesesDisponibles.length > 0
                                        ? `${formatMes(mesesDisponibles[mesesDisponibles.length - 1])} → ${formatMes(mesesDisponibles[0])}`
                                        : 'Sin datos aún'}
                                </p>
                            </div>
                            <div className="bg-gradient-to-br from-orange-900/60 to-slate-900/60 border border-orange-700/50 p-5 rounded-xl">
                                <p className="text-orange-300 text-sm mb-1">Causa #1 Histórica</p>
                                <p className="text-xl font-bold text-white leading-tight mt-1">
                                    {causasHistoricas.length > 0 ? causasHistoricas[0].causa : '—'}
                                </p>
                                <p className="text-orange-400 text-xs mt-1">
                                    {causasHistoricas.length > 0 ? `${causasHistoricas[0].count} retiros totales` : ''}
                                </p>
                            </div>
                        </div>

                        {historicoMensual.length > 0 ? (
                            <>
                                {/* Barras por mes */}
                                <h3 className="text-white font-bold mb-4">📊 Retiros por Mes</h3>
                                <div className="space-y-3 mb-10">
                                    {historicoMensual.map((m) => {
                                        const pct = Math.round((m.total / maxTotalMes) * 100);
                                        const esMesActual = m.mes === mesActual;
                                        return (
                                            <div
                                                key={m.mes}
                                                className={`p-4 rounded-xl border transition-all cursor-pointer ${esMesActual ? 'border-cyan-600/70 bg-cyan-900/20' : 'border-slate-700/60 bg-slate-800/30 hover:bg-slate-700/30'}`}
                                                onClick={() => { setMesFiltro(m.mes === mesActual ? 'actual' : m.mes); setFiltroAsesor('Todos'); window.scrollTo({top: 0, behavior: 'smooth'}); }}
                                            >
                                                <div className="flex justify-between items-center mb-2">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-white font-bold">{m.labelLargo}</span>
                                                        {esMesActual && (
                                                            <span className="text-xs bg-cyan-600 text-white px-2 py-0.5 rounded-full font-semibold">Actual</span>
                                                        )}
                                                    </div>
                                                    <div className="text-right">
                                                        <span className="text-2xl font-black text-cyan-400">{m.total}</span>
                                                        <span className="text-slate-400 text-xs ml-1">retiros</span>
                                                    </div>
                                                </div>
                                                {/* Barra de volumen */}
                                                <div className="w-full bg-slate-700/60 rounded-full h-4 mb-3">
                                                    <div
                                                        className={`h-4 rounded-full transition-all ${esMesActual ? 'bg-gradient-to-r from-cyan-500 to-blue-500' : 'bg-gradient-to-r from-purple-600 to-indigo-600'}`}
                                                        style={{width: `${pct}%`}}
                                                    ></div>
                                                </div>
                                                {/* Chips de causas */}
                                                {m.causas.length > 0 && (
                                                    <div className="flex flex-wrap gap-1.5 mt-1">
                                                        {m.causas.map((c, ci) => (
                                                            <span
                                                                key={c.causa}
                                                                className={`text-xs px-2 py-0.5 rounded-full border ${ci === 0 ? 'bg-red-900/40 border-red-700/50 text-red-300' : 'bg-slate-700/50 border-slate-600/50 text-slate-300'}`}
                                                            >
                                                                {c.causa}: <span className="font-bold">{c.count}</span>
                                                            </span>
                                                        ))}
                                                    </div>
                                                )}
                                                <p className="text-slate-500 text-xs mt-2">↑ Toca para ver el detalle de este mes</p>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Tabla ranking histórico de causas */}
                                <h3 className="text-white font-bold mb-4">📋 Ranking de Causas — Histórico General</h3>
                                <div className="bg-slate-800/50 rounded-xl overflow-hidden mb-8">
                                    <table className="w-full text-sm">
                                        <thead>
                                            <tr className="bg-slate-700/80">
                                                <th className="text-left py-3 px-4 text-slate-300 font-semibold">#</th>
                                                <th className="text-left py-3 px-4 text-slate-300 font-semibold">Causa</th>
                                                <th className="text-right py-3 px-4 text-slate-300 font-semibold">Total</th>
                                                <th className="text-right py-3 px-4 text-slate-300 font-semibold hidden md:table-cell">% Empresa</th>
                                                <th className="text-left py-3 px-4 text-slate-300 font-semibold hidden md:table-cell">Peso</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {causasHistoricas.map((c, idx) => {
                                                const pct = totalTodosLosTiempos > 0 ? ((c.count / totalTodosLosTiempos) * 100).toFixed(1) : 0;
                                                const medallaColor = idx === 0 ? 'text-yellow-400' : idx === 1 ? 'text-slate-300' : idx === 2 ? 'text-orange-400' : 'text-slate-500';
                                                return (
                                                    <tr key={c.causa} className="border-t border-slate-700 hover:bg-slate-700/30 transition-colors">
                                                        <td className="py-3 px-4">
                                                            <span className={`font-bold text-base ${medallaColor}`}>#{idx + 1}</span>
                                                        </td>
                                                        <td className="py-3 px-4 text-slate-200 font-medium">{c.causa}</td>
                                                        <td className="py-3 px-4 text-right">
                                                            <span className="text-cyan-400 font-black text-lg">{c.count}</span>
                                                        </td>
                                                        <td className="py-3 px-4 text-right text-slate-400 hidden md:table-cell">{pct}%</td>
                                                        <td className="py-3 px-4 hidden md:table-cell w-32">
                                                            <div className="w-full bg-slate-700 rounded-full h-2.5">
                                                                <div
                                                                    className="bg-gradient-to-r from-purple-500 to-indigo-500 h-2.5 rounded-full"
                                                                    style={{width: `${pct}%`}}
                                                                ></div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                        <tfoot>
                                            <tr className="bg-slate-700/60 border-t-2 border-slate-500">
                                                <td colSpan="2" className="py-3 px-4 text-white font-black">TOTAL EMPRESA</td>
                                                <td className="py-3 px-4 text-right text-cyan-400 font-black text-lg">{totalTodosLosTiempos}</td>
                                                <td className="py-3 px-4 text-right text-slate-400 hidden md:table-cell">100%</td>
                                                <td className="hidden md:table-cell"></td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>

                                {/* Matriz causa × mes */}
                                {mesesDisponibles.length > 1 && causasHistoricas.length > 0 && (
                                    <>
                                        <h3 className="text-white font-bold mb-4">🗂️ Matriz Causa × Mes</h3>
                                        <div className="overflow-x-auto scrollbar-thin rounded-xl">
                                            <table className="text-xs min-w-max">
                                                <thead>
                                                    <tr className="bg-slate-700/80">
                                                        <th className="text-left py-2 px-3 text-slate-300 font-semibold sticky left-0 bg-slate-700 min-w-48">Causa</th>
                                                        {mesesDisponibles.map(m => (
                                                            <th key={m} className={`text-center py-2 px-3 text-slate-300 font-semibold min-w-16 ${m === mesActual ? 'text-cyan-400' : ''}`}>
                                                                {formatMes(m)}
                                                            </th>
                                                        ))}
                                                        <th className="text-center py-2 px-3 text-slate-200 font-bold min-w-16">Total</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {causasHistoricas.map((c, idx) => (
                                                        <tr key={c.causa} className="border-t border-slate-700 hover:bg-slate-700/20">
                                                            <td className="py-2 px-3 text-slate-300 sticky left-0 bg-slate-800/90 font-medium">{c.causa}</td>
                                                            {mesesDisponibles.map(mes => {
                                                                const val = c.porMes.find(pm => pm.mes === mes)?.count || 0;
                                                                const maxVal = Math.max(...c.porMes.map(pm => pm.count), 1);
                                                                const intensidad = val > 0 ? Math.round((val / maxVal) * 100) : 0;
                                                                return (
                                                                    <td key={mes} className="py-2 px-3 text-center">
                                                                        {val > 0 ? (
                                                                            <span
                                                                                className="inline-block px-2 py-0.5 rounded font-bold"
                                                                                style={{
                                                                                    background: `rgba(6, 182, 212, ${0.1 + (intensidad / 100) * 0.7})`,
                                                                                    color: intensidad > 50 ? '#fff' : '#67e8f9'
                                                                                }}
                                                                            >
                                                                                {val}
                                                                            </span>
                                                                        ) : (
                                                                            <span className="text-slate-600">—</span>
                                                                        )}
                                                                    </td>
                                                                );
                                                            })}
                                                            <td className="py-2 px-3 text-center">
                                                                <span className="text-cyan-400 font-black">{c.count}</span>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                                <tfoot>
                                                    <tr className="bg-slate-700/60 border-t-2 border-slate-500">
                                                        <td className="py-2 px-3 text-white font-black sticky left-0 bg-slate-700">TOTAL MES</td>
                                                        {mesesDisponibles.map(mes => {
                                                            const totalMes = datosActivos.filter(r => (r.fecha || '').startsWith(mes)).reduce((sum, r) => sum + r.cantidad, 0);
                                                            return (
                                                                <td key={mes} className={`py-2 px-3 text-center font-black ${mes === mesActual ? 'text-cyan-400' : 'text-slate-200'}`}>
                                                                    {totalMes}
                                                                </td>
                                                            );
                                                        })}
                                                        <td className="py-2 px-3 text-center text-cyan-400 font-black">{totalTodosLosTiempos}</td>
                                                    </tr>
                                                </tfoot>
                                            </table>
                                        </div>
                                    </>
                                )}
                            </>
                        ) : (
                            <div className="text-center py-16 text-slate-400">
                                <p className="text-5xl mb-4">📭</p>
                                <p className="text-lg">Sin datos históricos aún.</p>
                                <p className="text-sm mt-2">Los meses aparecerán automáticamente a medida que se registren retiros.</p>
                            </div>
                        )}
                    </div>

                </div>
            );
        }

        // montado por el hub
    
ReactDOM.render(<NubeRetirosApp />, document.getElementById('retiros-root'));
</script>

</body></html>
